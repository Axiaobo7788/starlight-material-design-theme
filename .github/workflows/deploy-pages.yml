name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Astro deployment URL
        env:
          PAGES_ORIGIN: ${{ steps.pages.outputs.origin }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          ASTRO_SITE="${PAGES_ORIGIN}"
          if [ -z "${ASTRO_SITE}" ]; then
            ASTRO_SITE="https://${GITHUB_REPOSITORY_OWNER}.github.io"
          fi
          ASTRO_BASE="${PAGES_BASE_PATH}"
          if [ -z "${ASTRO_BASE}" ] && [ "${REPOSITORY_NAME}" != "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            ASTRO_BASE="/${REPOSITORY_NAME}"
          fi
          echo "ASTRO_SITE=${ASTRO_SITE}" >> "$GITHUB_ENV"
          echo "ASTRO_BASE=${ASTRO_BASE}" >> "$GITHUB_ENV"
          echo "Astro site: ${ASTRO_SITE}"
          echo "Astro base: ${ASTRO_BASE:-/}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package and demo
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo-dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
